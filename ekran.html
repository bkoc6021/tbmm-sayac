<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TBMM Genel Kurul Kürsü Ekranı</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #381c1c; /* Tam yüklediğin görseldeki o meşhur koyu kızıl/kahve arka plan */
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            user-select: none;
        }
        .digital-clock {
            font-family: 'Share Tech Mono', monospace;
            font-size: 22vw;
            color: #ff003c; /* Görseldeki birebir parlak dijital kırmızı */
            text-shadow: 0 0 25px #ff003c, 0 0 50px #ff003c;
            letter-spacing: 5px;
        }
        .flashing {
            animation: flash-animation 0.8s infinite;
        }
        @keyframes flash-animation {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.15; }
        }
    </style>
</head>
<body>

    <div class="digital-clock" id="time-display">00:00</div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // Senin Firebase adresin doğrudan koda eklendi
        const firebaseConfig = {
            databaseURL: "https://tbmm-sayac-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const display = document.getElementById('time-display');

        database.ref('sure').on('value', (snapshot) => {
            const yeniSure = snapshot.val();
            if (yeniSure) {
                display.innerText = yeniSure;
                if (yeniSure === "00:00") {
                    display.classList.add('flashing');
                } else {
                    display.classList.remove('flashing');
                }
            }
        });
    </script>
</body>
</html>
